# Firebase Hosting Deploy — VayuSense Atmospheric Intelligence Platform
name: Deploy VayuSense to Firebase Hosting

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy-frontend:
    name: Firebase Hosting Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Hosting
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          firebase deploy --only hosting --token "$FIREBASE_TOKEN" --project carbon-1c86f

  deploy-function:
    name: Cloud Function Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy Cloud Function
        run: |
          gcloud functions deploy compute_footprint \
            --gen2 \
            --runtime=python311 \
            --region=us-central1 \
            --source=functions/ \
            --entry-point=compute_footprint \
            --trigger-http \
            --allow-unauthenticated \
            --set-env-vars GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }} \
            --project scenic-energy-500112-u4
